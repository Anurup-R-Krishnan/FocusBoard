name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            FocusBoard/package-lock.json
            FocusBoard-backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: FocusBoard-backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: FocusBoard
        run: npm ci

      - name: Build Frontend
        working-directory: FocusBoard
        run: npm run build

      - name: Start Frontend Dev Server
        working-directory: FocusBoard
        run: |
          nohup npm run dev -- --host 0.0.0.0 --port 5173 > /tmp/vite.log 2>&1 &

      - name: Wait For Frontend
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:5173 > /dev/null; then
              echo "Frontend is up";
              exit 0;
            fi
            sleep 1
          done
          echo "Frontend did not start in time";
          exit 1

      - name: Run Cypress E2E Tests
        working-directory: FocusBoard
        run: npx cypress run --config baseUrl=http://localhost:5173

      # Backend Checks (Stub for Future Unit Tests)
      - name: Run Backend Tests
        working-directory: FocusBoard-backend
        run: npm test || echo "Backend test script not yet implemented"

      # ML Service Environment & Checks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install ML Service Dependencies
        working-directory: ml-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run ML Service Tests
        working-directory: ml-service
        run: pytest || echo "ML Service tests not yet implemented"

      # Tauri Build Step (Phase 10 Requirement)
      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri OS Dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "FocusBoard"
