name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            FocusBoard/package-lock.json
            FocusBoard-backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: FocusBoard-backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: FocusBoard
        run: npm ci

      - name: Build Frontend
        working-directory: FocusBoard
        run: npm run build

      - name: Start Backend + ML + Mongo (Docker Compose)
        run: |
          docker compose -f docker-compose.yml up -d --build mongo ml-service backend

      - name: Wait For Backend + ML
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:5000/api/activities > /dev/null && curl -sSf http://localhost:5001/health > /dev/null; then
              echo "Backend and ML are up";
              exit 0;
            fi
            sleep 2
          done
          echo "Backend/ML did not start in time";
          docker compose -f docker-compose.yml logs --tail=200 backend ml-service
          exit 1

      - name: Seed Student Demo Data
        run: |
          MONGO_URI=mongodb://localhost:27017/focusboard node FocusBoard-backend/scripts/seedStudentDay.js

      - name: Start Frontend Dev Server
        working-directory: FocusBoard
        run: |
          nohup npm run dev -- --host 0.0.0.0 --port 1420 > /tmp/vite.log 2>&1 &

      - name: Wait For Frontend
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:1420 > /dev/null; then
              echo "Frontend is up";
              exit 0;
            fi
            sleep 1
          done
          echo "Frontend did not start in time";
          exit 1

      - name: Run Cypress E2E Tests
        working-directory: FocusBoard
        run: npx cypress run --config baseUrl=http://localhost:1420

      # Backend Checks (Stub for Future Unit Tests)
      - name: Run Backend Tests
        working-directory: FocusBoard-backend
        run: npm test

      # ML Service Tests (inside container)
      - name: Run ML Service Tests
        run: docker exec focus-ml-service-1 pytest

      - name: Run Frontend Unit Tests
        working-directory: FocusBoard
        run: npm test

      # Tauri Build Step (Phase 10 Requirement)
      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri OS Dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "FocusBoard"

      - name: Trigger Render Deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set in GitHub Secrets."
            echo "Please set it using the 'gh' CLI."
            exit 1
          fi
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
