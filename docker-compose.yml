services:
  ml-service:
    build:
      context: ./ml-service
    ports:
      - "5001:5001"
    volumes:
      - ./ml-service:/app
      - /app/venv

  backend:
    build:
      context: ./FocusBoard-backend
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    volumes:
      - ./FocusBoard-backend:/app
      - /app/node_modules
    depends_on:
      - ml-service
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
