services:
  ml-service:
    build:
      context: ./ml-service
    environment:
      ML_WORKERS: "8"
      UVICORN_WORKERS: "8"
    ports:
      - "5001:5001"
    volumes:
      - ml_model_cache:/app/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  backend:
    build:
      context: ./FocusBoard-backend
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    volumes:
      - ./FocusBoard-backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      ml-service:
        condition: service_healthy

volumes:
  ml_model_cache:
